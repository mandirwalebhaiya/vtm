<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="marble" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f0f0f0"/>
      <line x1="0" y1="0" x2="8" y2="8" stroke="#ddd" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="300" height="300" fill="#e8e8e8"/>
  <rect x="50" y="40" width="200" height="220" fill="url(#marble)" stroke="#999" stroke-width="2" rx="4"/>
  <polygon points="150,20 130,50 170,50" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <circle cx="150" cy="150" r="30" fill="#d4a76a" opacity="0.2"/>
  <text x="150" y="160" font-size="35" text-anchor="middle" fill="#c9a17a">ॐ</text>
  <text x="150" y="270" font-size="12" text-anchor="middle" fill="#666">Marble Mandir</text>
</svg>